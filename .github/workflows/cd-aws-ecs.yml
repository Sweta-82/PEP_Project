name: CD - Deploy to AWS ECS

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_REPOSITORY_FRONTEND }}
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE_FRONTEND: ${{ vars.ECS_SERVICE_FRONTEND }}
  ECS_SERVICE_BACKEND: ${{ vars.ECS_SERVICE_BACKEND }}
  FRONTEND_CONTAINER_NAME: ${{ vars.FRONTEND_CONTAINER_NAME }}
  BACKEND_CONTAINER_NAME: ${{ vars.BACKEND_CONTAINER_NAME }}
  REACT_APP_BASE_URL: ${{ vars.REACT_APP_BASE_URL }}
  REACT_APP_RAZORPAY_KEY: ${{ vars.REACT_APP_RAZORPAY_KEY }}

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          required=(
            AWS_REGION
            ECR_REPOSITORY_FRONTEND
            ECR_REPOSITORY_BACKEND
            ECS_CLUSTER
            ECS_SERVICE_FRONTEND
            ECS_SERVICE_BACKEND
            FRONTEND_CONTAINER_NAME
            BACKEND_CONTAINER_NAME
            REACT_APP_BASE_URL
            REACT_APP_RAZORPAY_KEY
          )

          for var in "${required[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Missing repository variable: $var"
              exit 1
            fi
          done

          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "Missing repository secret: AWS_ROLE_TO_ASSUME"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: backend-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          BACKEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG"
          docker build -f backend/Dockerfile -t "$BACKEND_IMAGE" .
          docker push "$BACKEND_IMAGE"
          echo "image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        id: frontend-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FRONTEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG"
          docker build \
            --build-arg REACT_APP_BASE_URL=${{ vars.REACT_APP_BASE_URL }} \
            --build-arg REACT_APP_RAZORPAY_KEY=${{ vars.REACT_APP_RAZORPAY_KEY }} \
            -f Dockerfile \
            -t "$FRONTEND_IMAGE" \
            .
          docker push "$FRONTEND_IMAGE"
          echo "image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Fetch current backend task definition
        run: |
          BACKEND_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_BACKEND" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$BACKEND_TASK_DEF_ARN" \
            --query taskDefinition > backend-task-definition.json

      - name: Prepare backend task definition
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' backend-task-definition.json > backend-task-definition-clean.json

      - name: Render backend task definition
        id: backend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-definition-clean.json
          container-name: ${{ env.BACKEND_CONTAINER_NAME }}
          image: ${{ steps.backend-image.outputs.image }}

      - name: Deploy backend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Fetch current frontend task definition
        run: |
          FRONTEND_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_FRONTEND" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$FRONTEND_TASK_DEF_ARN" \
            --query taskDefinition > frontend-task-definition.json

      - name: Prepare frontend task definition
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' frontend-task-definition.json > frontend-task-definition-clean.json

      - name: Render frontend task definition
        id: frontend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition-clean.json
          container-name: ${{ env.FRONTEND_CONTAINER_NAME }}
          image: ${{ steps.frontend-image.outputs.image }}

      - name: Deploy frontend service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_FRONTEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
