name: CI

on:
  pull_request:
  push:
    branches: ["main", "master", "develop"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          REACT_APP_BASE_URL: http://localhost:4000/api/v1
          REACT_APP_RAZORPAY_KEY: dummy_key_for_ci
          CI: false
        run: npm run build

  backend:
    name: Backend Install Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate backend package metadata
        working-directory: backend
        run: npm pkg get name version type

  containers:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD || vars.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          TAG_PREFIX="${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}"
          if [ -z "$TAG_PREFIX" ]; then TAG_PREFIX="local"; fi
          
          docker build -f backend/Dockerfile \
            -t ${TAG_PREFIX}/edvora-backend:latest \
            -t ${TAG_PREFIX}/edvora-backend:${{ github.sha }} \
            .

      - name: Build frontend image
        run: |
          TAG_PREFIX="${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}"
          if [ -z "$TAG_PREFIX" ]; then TAG_PREFIX="local"; fi
          
          docker build \
            --build-arg REACT_APP_BASE_URL=http://localhost:4000/api/v1 \
            --build-arg REACT_APP_RAZORPAY_KEY=dummy_key_for_ci \
            -f Dockerfile \
            -t ${TAG_PREFIX}/edvora-frontend:latest \
            -t ${TAG_PREFIX}/edvora-frontend:${{ github.sha }} \
            .

      - name: Push images to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}/edvora-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}/edvora-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}/edvora-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME || vars.DOCKER_USERNAME }}/edvora-frontend:${{ github.sha }}
